name: Zip up the pack

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create the version tag
        id: version
        run: |
          git fetch --tags

          LATEST=$(git tag --list 'v[0-9]*' | sort -V | tail -n 1)
          if [ -z "$LATEST" ]; then
            NEXT="v1"
          else
            NUM="${LATEST#v}"
            NEXT="v$((NUM + 1))"
          fi

          echo "tag=$NEXT" >> $GITHUB_OUTPUT

      - name: Zip up pack
        run: |
          cd "$GITHUB_WORKSPACE"
          zip -r pack.zip . \
            --exclude "*.git*" \
            --exclude ".github/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: pack.zip